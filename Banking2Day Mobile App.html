  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

sition:absolute;top:50%;left:0;right:0;transform:translateY(-50%);height:7px;background:#eef1f7;border-radius:4px;\"><\u002Fdiv>\n                <div style=\"position:absolute;top:50%;left:0;transform:translateY(-50%);height:7px;width:{{ ratePct }}%;background:#4A90F0;border-radius:4px;\"><\u002Fdiv>\n                <div style=\"position:absolute;top:50%;left:{{ ratePct }}%;transform:translate(-50%,-50%);width:20px;height:20px;border-radius:50%;background:#fff;border:3px solid #2F7AE0;box-shadow:0 3px 8px rgba(15,40,90,.2);\"><\u002Fdiv>\n                <input type=\"range\" min=\"1\" max=\"3\" step=\"0.1\" value=\"{{ emiRate }}\" oninput=\"{{ onEmiRate }}\" style=\"position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;margin:0;\">\n              <\u002Fdiv>\n\n              <div style=\"display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:6px;\"><span style=\"color:#7c8aa0;\">Tenure<\u002Fspan><span style=\"font-family:'Sora';font-weight:700;\">{{ emiTenureVal }} months<\u002Fspan><\u002Fdiv>\n              <div style=\"position:relative;height:22px;margin:0 2px 20px;\">\n                <div style=\"position:absolute;top:50%;left:0;right:0;transform:translateY(-50%);height:7px;background:#eef1f7;border-radius:4px;\"><\u002Fdiv>\n                <div style=\"position:absolute;top:50%;left:0;transform:translateY(-50%);height:7px;width:{{ tenPct }}%;background:#4A90F0;border-radius:4px;\"><\u002Fdiv>\n                <div style=\"position:absolute;top:50%;left:{{ tenPct }}%;transform:translate(-50%,-50%);width:20px;height:20px;border-radius:50%;background:#fff;border:3px solid #2F7AE0;box-shadow:0 3px 8px rgba(15,40,90,.2);\"><\u002Fdiv>\n                <input type=\"range\" min=\"6\" max=\"48\" step=\"6\" value=\"{{ emiTenure }}\" oninput=\"{{ onEmiTenure }}\" style=\"position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;margin:0;\">\n              <\u002Fdiv>\n\n              <div style=\"background:#F4F8FE;border-radius:18px;padding:15px;display:flex;align-items:center;gap:16px;\">\n                <div style=\"width:64px;height:64px;border-radius:50%;background:{{ donut }};flex:none;display:flex;align-items:center;justify-content:center;\"><div style=\"width:42px;height:42px;border-radius:50%;background:#F4F8FE;\"><\u002Fdiv><\u002Fdiv>\n                <div style=\"flex:1;font-size:12px;\">\n                  <div style=\"display:flex;align-items:center;gap:7px;margin-bottom:7px;\"><span style=\"width:9px;height:9px;background:#2F7AE0;border-radius:3px;\"><\u002Fspan>Principal · {{ emiAmountFmt }}<\u002Fdiv>\n                  <div style=\"display:flex;align-items:center;gap:7px;margin-bottom:9px;\"><span style=\"width:9px;height:9px;background:#cfe0f5;border-radius:3px;\"><\u002Fspan>Interest · {{ calcInterestFmt }}<\u002Fdiv>\n                  <div style=\"font-family:'Sora';font-weight:700;font-size:13px;\">Total payable {{ calcTotalFmt }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding:0 20px 24px;\"><div onclick=\"{{ openApply }}\" style=\"background:#2F7AE0;color:#fff;border-radius:15px;padding:15px;text-align:center;font-family:'Sora';font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 10px 24px rgba(47,122,224,.3);\">Apply for this loan<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ LENDERS LIST (sub) ============ -->\n        <sc-if value=\"{{ showLenders }}\" hint-placeholder-val=\"{{ false }}\">\n          <div class=\"scr\" style=\"position:absolute;inset:0;overflow-y:auto;background:#F4F8FE;\">\n            <div style=\"padding:16px 20px 14px;background:#fff;border-bottom:1px solid #eef1f7;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:5;\">\n              <div onclick=\"{{ closeSub }}\" style=\"cursor:pointer;display:flex;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0C1A24\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M15 6l-6 6 6 6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n              <div><div style=\"font-family:'Sora';font-weight:700;font-size:17px;line-height:1.1;\">{{ lenderTitle }}<\u002Fdiv><div style=\"font-size:11.5px;color:#7c8aa0;margin-top:2px;\">{{ lenderSub }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding:16px 18px;display:flex;flex-direction:column;gap:14px;\">\n              <sc-for list=\"{{ lenders }}\" as=\"ln\" hint-placeholder-count=\"4\">\n                <div style=\"background:#fff;border:1px solid #eef1f7;border-radius:18px;padding:16px;box-shadow:0 4px 14px rgba(15,40,90,.05);\">\n                  <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:14px;\">\n                    <span style=\"width:42px;height:42px;border-radius:12px;background:{{ ln.bg }};color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Sora';font-weight:800;font-size:18px;flex:none;\">{{ ln.initial }}<\u002Fspan>\n                    <span style=\"font-family:'Sora';font-weight:700;font-size:16px;\">{{ ln.name }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:13px 10px;margin-bottom:15px;\">\n                    <div><div style=\"font-size:11px;color:#94a0ae;margin-bottom:2px;\">{{ labels.a }}<\u002Fdiv><div style=\"font-family:'Sora';font-weight:700;font-size:13.5px;\">{{ ln.v1 }}<\u002Fdiv><\u002Fdiv>\n                    <div><div style=\"font-size:11px;color:#94a0ae;margin-bottom:2px;\">{{ labels.b }}<\u002Fdiv><div style=\"font-family:'Sora';font-weight:700;font-size:13.5px;\">{{ ln.v2 }}<\u002Fdiv><\u002Fdiv>\n                    <div><div style=\"font-size:11px;color:#94a0ae;margin-bottom:2px;\">{{ labels.c }}<\u002Fdiv><div style=\"font-family:'Sora';font-weight:700;font-size:13.5px;\">{{ ln.v3 }}<\u002Fdiv><\u002Fdiv>\n                    <div><div style=\"font-size:11px;color:#94a0ae;margin-bottom:2px;\">{{ labels.d }}<\u002Fdiv><div style=\"font-family:'Sora';font-weight:700;font-size:13.5px;\">{{ ln.v4 }}<\u002Fdiv><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div onclick=\"{{ applyNow }}\" style=\"background:#2F7AE0;color:#fff;border-radius:12px;padding:12px;text-align:center;font-family:'Sora';font-weight:700;font-size:13.5px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;\">Apply Now <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n\n      <!-- ===== BOTTOM NAV ===== -->\n      <sc-if value=\"{{ showNav }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:#fff;border-top:1px solid #e9edf3;display:flex;justify-content:space-between;align-items:center;padding:9px 18px 6px;\">\n          <div onclick=\"{{ tabHome }}\" style=\"display:flex;flex-direction:column;align-items:center;gap:4px;font-size:9.5px;font-weight:600;color:{{ nav.home }};cursor:pointer;flex:1;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linejoin=\"round\"><path d=\"M3 11l9-7 9 7\"><\u002Fpath><path d=\"M5 10v10h14V10\"><\u002Fpath><\u002Fsvg>Home<\u002Fdiv>\n          <div onclick=\"{{ tabLoans }}\" style=\"display:flex;flex-direction:column;align-items:center;gap:4px;font-size:9.5px;font-weight:600;color:{{ nav.loans }};cursor:pointer;flex:1;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><rect x=\"2\" y=\"6\" width=\"20\" height=\"12\" rx=\"2\"><\u002Frect><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><\u002Fsvg>Loans<\u002Fdiv>\n          <div onclick=\"{{ tabCards }}\" style=\"display:flex;flex-direction:column;align-items:center;gap:4px;font-size:9.5px;font-weight:600;color:{{ nav.cards }};cursor:pointer;flex:1;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><rect x=\"2\" y=\"5\" width=\"20\" height=\"14\" rx=\"2\"><\u002Frect><path d=\"M2 9h20\"><\u002Fpath><\u002Fsvg>Cards<\u002Fdiv>\n          <div onclick=\"{{ tabScore }}\" style=\"display:flex;flex-direction:column;align-items:center;gap:4px;font-size:9.5px;font-weight:600;color:{{ nav.score }};cursor:pointer;flex:1;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"><path d=\"M4 16a8 8 0 0116 0\"><\u002Fpath><path d=\"M12 16l4-4\"><\u002Fpath><\u002Fsvg>Credit Score<\u002Fdiv>\n          <div onclick=\"{{ tabFeed }}\" style=\"display:flex;flex-direction:column;align-items:center;gap:4px;font-size:9.5px;font-weight:600;color:{{ nav.feed }};cursor:pointer;flex:1;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"16\" rx=\"2\"><\u002Frect><path d=\"M7 9h6M7 13h10M7 17h7\"><\u002Fpath><\u002Fsvg>Feed<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { screen:'app', tab:'home', sub:null, product:'personal', phone:'', applyAmount:300000, applyTenure:24, emiAmount:300000, emiRate:1.5, emiTenure:24, live:null, articles:null };\n\n  // Pull live products from the shared Banking2Day admin (Supabase) once mounted.\n  // Falls back silently to the built-in placeholder data until keys are configured.\n  componentDidMount(){ this.loadLive(); this.loadArticles(); }\n  async loadArticles(){\n    if (!window.B2D) return;\n    try {\n      const rows = await window.B2D.getArticles({ status: 'Published' });\n      if (rows && rows.length) this.setState({ articles: rows.map(a => ({\n        title: a.title, image: a.image_url || '', cat: (a.category || '').toUpperCase()\n      })) });\n    } catch (e) { /* admin not configured yet — keep placeholder feed */ }\n  }\n  async loadLive(){\n    if (!window.B2D) return;\n    const cats = { personal:'personal_loan', business:'business_loan', home:'home_loan', gold:'gold_loan', cards:'credit_card' };\n    try {\n      const live = {};\n      await Promise.all(Object.entries(cats).map(async ([k, cat]) => {\n        try {\n          const rows = await window.B2D.getProducts(cat);\n          const liveRows = (rows || []).filter(r => r.status === 'Live');\n          if (liveRows.length) live[k] = liveRows.map(r => ({\n            bg:'#E3E9F2', initial:(r.initials||'').slice(0,3), name:r.provider || 'Bank Name',\n            v1:r.highlight || '—', v2:r.rate_label || '—', v3:'—', v4:'—'\n          }));\n        } catch (e) { /* this category unavailable — keep its placeholder */ }\n      }));\n      if (Object.keys(live).length) this.setState({ live });\n    } catch (e) { /* admin not configured yet — keep placeholders */ }\n  }\n\n  go(s){ this.setState({ screen:s }); }\n  inr(n){ return '₹' + Math.round(n).toLocaleString('en-IN'); }\n  emiCalc(P, ratePct, m){ const r = ratePct/100; const f = Math.pow(1+r, m); return P*r*f/(f-1); }\n\n  productInfo(p){\n    const B = {\n      icici:{bg:'#AE2A28',initial:'I',name:'ICICI Bank'},\n      hdfc:{bg:'#004C8F',initial:'H',name:'HDFC Bank'},\n      axis:{bg:'#97144D',initial:'A',name:'Axis Bank'},\n      kotak:{bg:'#003874',initial:'K',name:'Kotak Bank'},\n      sbi:{bg:'#22409A',initial:'S',name:'SBI'},\n      intent:{bg:'#2F7AE0',initial:'i',name:'Intent Instant'},\n      muthoot:{bg:'#C8102E',initial:'M',name:'Muthoot Finance'},\n      manappuram:{bg:'#E4002B',initial:'M',name:'Manappuram'},\n      amazon:{bg:'#0F1111',initial:'a',name:'ICICI Amazon Pay'},\n    };\n    const row = (b,v1,v2,v3,v4) => ({ bg:'#E3E9F2', initial:'', name:'Bank Name', v1, v2, v3, v4 });\n    const loanLabels = { a:'Processing Time', b:'Interest Rate', c:'Processing Fees', d:'Max Loan Amount' };\n    const map = {\n      personal:{ title:'Personal Loan', sub:'5 lenders matched to your profile', labels:loanLabels, lenders:[\n        row(B.intent,'Instant','1.5% / mo','Nil','₹5 Lakh'),\n        row(B.icici,'3 – 5 Days','10.50% onwards','Upto 2.5%','₹50 Lakh'),\n        row(B.hdfc,'1 – 3 Days','10.75% onwards','₹4999 + GST','₹40 Lakh'),\n        row(B.axis,'3 – 5 Days','10.99% onwards','Upto 2%','₹40 Lakh'),\n        row(B.kotak,'2 – 4 Days','10.99% onwards','₹4999','₹35 Lakh'),\n      ]},\n      business:{ title:'Business Loan', sub:'Collateral-free working capital', labels:loanLabels, lenders:[\n        row(B.icici,'3 – 5 Days','14.00% onwards','Upto 2%','₹2 Crore'),\n        row(B.hdfc,'3 – 5 Days','15.00% onwards','₹4999 + GST','₹50 Lakh'),\n        row(B.axis,'4 – 6 Days','14.50% onwards','Upto 2%','₹75 Lakh'),\n        row(B.kotak,'3 – 5 Days','16.00% onwards','2%','₹50 Lakh'),\n      ]},\n      home:{ title:'Home Loan', sub:'Lowest rates, longest tenure', labels:loanLabels, lenders:[\n        row(B.sbi,'5 – 7 Days','8.40% p.a.','Upto 0.35%','₹5 Crore'),\n        row(B.hdfc,'4 – 6 Days','8.50% p.a.','₹3000 + GST','₹3 Crore'),\n        row(B.icici,'5 – 7 Days','8.55% p.a.','Upto 0.50%','₹5 Crore'),\n        row(B.axis,'5 – 7 Days','8.60% p.a.','Upto 0.50%','₹3 Crore'),\n      ]},\n      gold:{ title:'Gold Loan', sub:'Same-day cash against gold', labels:loanLabels, lenders:[\n        row(B.muthoot,'Same Day','9.90% onwards','Upto 1%','₹50 Lakh'),\n        row(B.manappuram,'Same Day','10.50% onwards','Nil','₹40 Lakh'),\n        row(B.icici,'1 – 2 Days','9.25% onwards','Upto 1%','₹1 Crore'),\n        row(B.hdfc,'1 – 2 Days','9.50% onwards','₹500 + GST','₹50 Lakh'),\n      ]},\n      cards:{ title:'Credit Cards', sub:'Pre-qualified for your 742 score', labels:{ a:'Joining Fee', b:'Annual Fee', c:'Rewards', d:'Best For' }, lenders:[\n        row(B.hdfc,'₹1000','₹1000','5% cashback','Online spends'),\n        row(B.amazon,'Nil','Nil','5% on Amazon','Shopping'),\n        row(B.axis,'₹12500','₹12500','12X points','Travel'),\n        row(B.sbi,'₹999','₹999','5% online','Cashback'),\n      ]},\n    };\n    return map[p] || map.personal;\n  }\n\n  renderVals(){\n    const st = this.state;\n    const PRIMARY = '#2F7AE0', MUTED = '#94a0ae';\n    const showApp = st.screen === 'app';\n\n    const aMin = 50000, aMax = 500000;\n    const applyPct = (st.applyAmount - aMin) / (aMax - aMin) * 100;\n    const applyEmi = this.emiCalc(st.applyAmount, 1.5, st.applyTenure);\n    const applyTotal = applyEmi * st.applyTenure;\n\n    const emiPct = (st.emiAmount - aMin) / (aMax - aMin) * 100;\n    const ratePct = (st.emiRate - 1) / (3 - 1) * 100;\n    const tenPct = (st.emiTenure - 6) / (48 - 6) * 100;\n    const calcEmi = this.emiCalc(st.emiAmount, st.emiRate, st.emiTenure);\n    const calcTotal = calcEmi * st.emiTenure;\n    const calcInterest = calcTotal - st.emiAmount;\n    const pAngle = st.emiAmount / calcTotal * 360;\n\n    const chip = (active) => ({\n      border: active ? PRIMARY : '#dfe4ec',\n      bg: active ? '#EAF2FE' : '#fff',\n      color: active ? PRIMARY : '#5c6b78'\n    });\n    const navc = (t) => (showApp && !st.sub && st.tab === t) ? PRIMARY : MUTED;\n    const pinfo = this.productInfo(st.product);\n    if (st.live && st.live[st.product] && st.live[st.product].length) pinfo.lenders = st.live[st.product];\n\n    let statusColor = '#0C1A24';\n    if (st.screen === 'login') statusColor = '#fff';\n    if (showApp && !st.sub && (st.tab === 'home' || st.tab === 'score' || st.tab === 'me')) statusColor = '#fff';\n\n    return {\n      statusColor,\n      showWelcome: st.screen === 'welcome',\n      showLogin:   st.screen === 'login',\n      showOtp:     st.screen === 'otp',\n      isHome:  showApp && !st.sub && st.tab === 'home',\n      isLoans: showApp && !st.sub && st.tab === 'loans',\n      isCards: showApp && !st.sub && st.tab === 'cards',\n      isScore: showApp && !st.sub && st.tab === 'score',\n      isFeed:  showApp && !st.sub && st.tab === 'feed',\n      hasArticles: !!(st.articles && st.articles.length),\n      noArticles:  !(st.articles && st.articles.length),\n      feedItems: (st.articles || []).map(a => {\n        const img = a.image ? ' url(\"' + a.image + '\")' : '';\n        return {\n          title: a.title, cat: a.cat,\n          coverHome: 'width:100%;height:128px;border-radius:13px;background:#EAF2FE center/cover' + img + ';',\n          coverFeed: 'width:104px;height:84px;border-radius:13px;background:#EAF2FE center/cover' + img + ';flex:none;',\n        };\n      }),\n      isMe:    showApp && !st.sub && st.tab === 'me',\n      showApply: showApp && st.sub === 'apply',\n      showEmi:   showApp && st.sub === 'emi',\n      showNav:   showApp && !st.sub,\n      showLenders: showApp && st.sub === 'lenders',\n      lenderTitle: pinfo.title,\n      lenderSub: pinfo.sub,\n      labels: pinfo.labels,\n      lenders: pinfo.lenders,\n\n      phone: st.phone,\n      phoneDisplay: st.phone || '98765 43210',\n\n      applyAmount: st.applyAmount,\n      applyTenure: st.applyTenure,\n      applyAmountFmt: this.inr(st.applyAmount),\n      applyEmiFmt: this.inr(applyEmi),\n      applyTotalFmt: this.inr(applyTotal),\n      applyPct,\n      t12: chip(st.applyTenure === 12),\n      t24: chip(st.applyTenure === 24),\n      t36: chip(st.applyTenure === 36),\n\n      emiAmount: st.emiAmount,\n      emiRate: st.emiRate,\n      emiTenure: st.emiTenure,\n      emiTenureVal: st.emiTenure,\n      emiAmountFmt: this.inr(st.emiAmount),\n      emiRateFmt: st.emiRate.toFixed(1),\n      emiPct, ratePct, tenPct,\n      calcEmiFmt: this.inr(calcEmi),\n      calcTotalFmt: this.inr(calcTotal),\n      calcInterestFmt: this.inr(calcInterest),\n      donut: 'conic-gradient(#2F7AE0 0deg ' + pAngle + 'deg, #cfe0f5 ' + pAngle + 'deg 360deg)',\n\n      nav: { home:navc('home'), loans:navc('loans'), cards:navc('cards'), score:navc('score'), feed:navc('feed'), me:navc('me') },\n\n      goLogin: () => this.go('login'),\n      getOtp:  () => this.go('otp'),\n      verify:  () => this.setState({ screen:'app', tab:'home', sub:null }),\n      editPhone: () => this.go('login'),\n      logout:  () => this.setState({ tab:'home', sub:null }),\n      onPhone: (e) => this.setState({ phone: e.target.value }),\n\n      tabHome:  () => this.setState({ tab:'home', sub:null }),\n      tabLoans: () => this.setState({ tab:'loans', sub:null }),\n      tabCards: () => this.setState({ tab:'cards', sub:null }),\n      tabScore: () => this.setState({ tab:'score', sub:null }),\n      tabMe:    () => this.setState({ tab:'me', sub:null }),\n      tabFeed:  () => this.setState({ tab:'feed', sub:null }),\n\n      openApply: () => this.setState({ screen:'app', sub:'apply' }),\n      openEmi:   () => this.setState({ screen:'app', sub:'emi' }),\n      closeSub:  () => this.setState({ sub:null }),\n      openPersonal:  () => this.setState({ screen:'app', sub:'lenders', product:'personal' }),\n      openBusiness:  () => this.setState({ screen:'app', sub:'lenders', product:'business' }),\n      openHome:      () => this.setState({ screen:'app', sub:'lenders', product:'home' }),\n      openGold:      () => this.setState({ screen:'app', sub:'lenders', product:'gold' }),\n      openCardsList: () => this.setState({ screen:'app', sub:'lenders', product:'cards' }),\n      applyNow:      () => this.setState({ sub:'apply' }),\n\n      onApplyAmt: (e) => this.setState({ applyAmount: Number(e.target.value) }),\n      setT12: () => this.setState({ applyTenure:12 }),\n      setT24: () => this.setState({ applyTenure:24 }),\n      setT36: () => this.setState({ applyTenure:36 }),\n      onEmiAmt:    (e) => this.setState({
